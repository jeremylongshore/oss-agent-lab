name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check .
      - name: Format check with ruff
        run: ruff format --check .
      - name: Type check with mypy
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=oss_agent_lab --cov-report=xml --cov-report=term-missing tests/
      - name: Enforce 85% coverage threshold
        run: |
          coverage_pct=$(python -c "
          import xml.etree.ElementTree as ET
          rate = float(ET.parse('coverage.xml').getroot().get('line-rate'))
          print(f'{rate * 100:.0f}')
          ")
          echo "Coverage: ${coverage_pct}%"
          if [ "$coverage_pct" -lt 85 ]; then
            echo "FAIL: Coverage ${coverage_pct}% is below 85% threshold"
            exit 1
          fi

  validate-specialists:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Validate SKILL.md files
        run: |
          python -c "
          from pathlib import Path
          import yaml
          required = [
              'name', 'display_name', 'description', 'version',
              'source_repo', 'license', 'tier', 'capabilities',
              'allowed_tools', 'output_formats',
          ]
          count = 0
          for skill in sorted(Path('agents/specialists').glob('*/SKILL.md')):
              if skill.parent.name == '_template':
                  continue
              content = skill.read_text()
              if content.startswith('---'):
                  fm = content.split('---')[1]
                  data = yaml.safe_load(fm)
                  missing = [f for f in required if f not in data]
                  if missing:
                      print(f'FAIL: {skill} missing: {missing}')
                      exit(1)
              count += 1
              print(f'OK: {skill}')
          print(f'All {count} SKILL.md files valid')
          if count < 10:
              print(f'WARNING: Expected 10 specialists, found {count}')
          "
      - name: Verify all specialists are importable
        run: |
          python -c "
          specialists = [
              'autoresearch', 'swarm_predict', 'deer_flow',
              'browser_ai', 'knowledge_graph', 'stock_analyst',
              'opinion_analyst', 'gui_agent', 'sandbox', 'repo_scanner',
          ]
          for name in specialists:
              mod = __import__(f'agents.specialists.{name}.agent', fromlist=['*'])
              print(f'OK: {name} ({mod.__name__})')
          print(f'All {len(specialists)} specialists importable')
          "

  generate-outputs:
    runs-on: ubuntu-latest
    needs: [lint, test, validate-specialists]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Generate outputs for all specialists
        run: |
          python -c "
          from pathlib import Path
          from scripts.generate_outputs import generate_outputs
          specialists_dir = Path('agents/specialists')
          count = 0
          for specialist in sorted(specialists_dir.iterdir()):
              if not specialist.is_dir() or specialist.name.startswith('_'):
                  continue
              skill_md = specialist / 'SKILL.md'
              if not skill_md.exists():
                  continue
              try:
                  outputs = generate_outputs(specialist)
                  print(f'OK: {specialist.name} -> {len(outputs)} formats')
                  count += 1
              except Exception as e:
                  print(f'FAIL: {specialist.name}: {e}')
                  exit(1)
          print(f'Generated outputs for {count} specialists')
          "
