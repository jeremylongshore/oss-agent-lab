name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check .
      - name: Type check with mypy
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest --cov=oss_agent_lab --cov-report=xml tests/
      - name: Check coverage
        run: |
          coverage_pct=$(python -c "import xml.etree.ElementTree as ET; print(f'{float(ET.parse(\"coverage.xml\").getroot().get(\"line-rate\")) * 100:.0f}')")
          echo "Coverage: ${coverage_pct}%"

  validate-specialists:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Validate SKILL.md files
        run: |
          python -c "
          from pathlib import Path
          import yaml
          required = ['name', 'display_name', 'description', 'version', 'source_repo', 'license', 'tier', 'capabilities', 'allowed_tools', 'output_formats']
          for skill in Path('agents/specialists').glob('*/SKILL.md'):
              if skill.parent.name == '_template':
                  continue
              content = skill.read_text()
              if content.startswith('---'):
                  fm = content.split('---')[1]
                  data = yaml.safe_load(fm)
                  missing = [f for f in required if f not in data]
                  if missing:
                      print(f'FAIL: {skill} missing: {missing}')
                      exit(1)
              print(f'OK: {skill}')
          print('All SKILL.md files valid')
          "
